<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골디 셸터 농장 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root {
  --gold:#C8860A; --gold-pale:#FFF8E7; --gold-bg:#FFFDF5;
  --brown:#6B3F0E; --brown-light:#A0632A; --cream:#FDF3DC;
  --text:#2C1A06; --text-muted:#8B6A3A; --border:#E8D5A3;
  --female:#D4547A; --female-bg:#FFF0F5;
  --male:#3A7AC8;  --male-bg:#EEF5FF;
  --puppy:#7B5EA7; --puppy-bg:#F3EEFF;
  --kennel-bg:#F5F0E8;
  --shadow:0 4px 20px rgba(100,60,10,.10); --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gold-bg);color:var(--text);min-height:100vh;}

/* ── header ── */
header{background:linear-gradient(135deg,var(--brown),var(--gold));padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(100,60,10,.25);}
header h1{color:#fff;font-size:1.4rem;font-weight:900;}
header p{color:rgba(255,255,255,.75);font-size:.78rem;margin-top:2px;}

/* ── tabs ── */
.tabs{display:flex;background:var(--cream);border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{flex:1;min-width:60px;padding:11px 4px;text-align:center;font-size:.78rem;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-pale);}
.tab:hover:not(.active){background:#f5ead0;}

.content{padding:18px 14px 70px;max-width:700px;margin:0 auto;}

/* ── section title ── */
.sec-title{font-size:1rem;font-weight:900;color:var(--brown);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--gold);color:#fff;}

/* ── add dog button ── */
.add-dog-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px;margin-bottom:16px;
  border:2.5px dashed var(--border);border-radius:var(--radius);
  background:var(--gold-pale);color:var(--text-muted);
  font-family:inherit;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.add-dog-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── dog grid ── */
.dog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:24px;}
.dog-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:transform .18s,box-shadow .18s;border:2px solid transparent;position:relative;overflow:hidden;}
.dog-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(100,60,10,.15);}
.dog-card.selected{border-color:var(--gold);}
.dog-photo{width:100%;height:100px;object-fit:cover;display:block;}
.dog-photo-placeholder{width:100%;height:100px;display:flex;align-items:center;justify-content:center;background:var(--gold-pale);font-size:2.2rem;}
.dog-card-body{padding:8px 10px 10px;}
.dog-card .code{font-size:1rem;font-weight:900;margin-bottom:3px;}
.dog-card.female .code{color:var(--female);}
.dog-card.male .code{color:var(--male);}
.kennel-tag{font-size:.68rem;font-weight:700;padding:2px 6px;border-radius:6px;display:inline-block;}
.dog-card.female .kennel-tag{background:var(--female-bg);color:var(--female);}
.dog-card.male .kennel-tag{background:var(--male-bg);color:var(--male);}
.due-badge,.pregnant-badge{position:absolute;top:6px;right:6px;font-size:.6rem;font-weight:700;padding:2px 5px;border-radius:5px;z-index:2;}
.due-badge{background:#FF6B35;color:#fff;}
.pregnant-badge{background:#8BC34A;color:#fff;}
.edit-btn{position:absolute;top:6px;left:6px;width:26px;height:26px;background:rgba(0,0,0,.38);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;z-index:3;cursor:pointer;border:none;transition:background .2s;}
.edit-btn:hover{background:rgba(200,134,10,.9);}

/* ── detail panel ── */
.detail-panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:20px;border-left:5px solid var(--gold);display:none;}
.detail-panel.show{display:block;}
.info-row{display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
.info-item{background:var(--gold-pale);border-radius:9px;padding:7px 11px;flex:1;min-width:110px;}
.info-item .label{font-size:.65rem;color:var(--text-muted);margin-bottom:1px;}
.info-item .value{font-size:.9rem;font-weight:700;}

/* ── kennel ── */
.kennel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.kennel-box{background:var(--kennel-bg);border-radius:13px;padding:12px;border:2px solid var(--border);min-height:80px;cursor:pointer;transition:border-color .2s;}
.kennel-box:hover{border-color:var(--gold);}
.kennel-box .kname{font-size:.9rem;font-weight:900;color:var(--brown);margin-bottom:6px;}
.kennel-dog{font-size:.68rem;font-weight:700;padding:2px 5px;border-radius:5px;display:inline-block;margin:1px;}
.kennel-dog.f{background:var(--female-bg);color:var(--female);}
.kennel-dog.m{background:var(--male-bg);color:var(--male);}
.kennel-empty{font-size:.72rem;color:#bbb;}

/* ── breeding ── */
.breeding-list{display:flex;flex-direction:column;gap:10px;}
.breeding-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border-left:5px solid #8BC34A;cursor:pointer;transition:transform .15s;}
.breeding-card:hover{transform:translateY(-2px);}
.breeding-card.due-soon{border-left-color:#FF6B35;}
.breeding-card.bc-open{border:2px solid var(--gold);}
.bc-body{padding:12px 14px;}
.bc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.bc-title{font-weight:900;font-size:.9rem;}
.bc-days{font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:99px;}
.breeding-card.due-soon .bc-days{background:#FFEDE5;color:#FF6B35;}
.breeding-card:not(.due-soon) .bc-days{background:#EEF7E0;color:#5A9E1A;}
.bc-info{font-size:.78rem;color:var(--text-muted);}
.bc-thumb-row{display:flex;gap:5px;margin-top:7px;overflow-x:auto;padding-bottom:2px;}
.bc-thumb{width:48px;height:48px;border-radius:7px;object-fit:cover;flex-shrink:0;border:2px solid var(--border);}
.bc-thumb-more{width:48px;height:48px;border-radius:7px;background:var(--gold-pale);border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--text-muted);}

/* ── breeding detail panel ── */
.breeding-detail{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:2px solid var(--gold);display:none;}
.breeding-detail.show{display:block;}
.bd-header{background:linear-gradient(135deg,var(--brown),var(--gold));padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.bd-header h3{color:#fff;font-size:.95rem;font-weight:900;}
.bd-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;}
.bd-info-strip{display:flex;border-bottom:1px solid var(--border);}
.bd-info-cell{flex:1;padding:9px 10px;text-align:center;border-right:1px solid var(--border);}
.bd-info-cell:last-child{border-right:none;}
.bd-info-cell .lbl{font-size:.6rem;color:var(--text-muted);margin-bottom:1px;}
.bd-info-cell .val{font-size:.82rem;font-weight:900;color:var(--brown);}
.bd-photos-section{padding:12px 14px;}
.bd-photos-title{font-size:.8rem;font-weight:700;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.bd-photo-count{font-size:.68rem;background:var(--gold-pale);color:var(--gold);padding:2px 7px;border-radius:99px;font-weight:700;}
.bd-photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:7px;}
.bd-photo-cell{position:relative;border-radius:9px;overflow:hidden;aspect-ratio:1;border:2px solid var(--border);cursor:pointer;transition:transform .15s;}
.bd-photo-cell:hover{transform:scale(1.04);}
.bd-photo-cell img{width:100%;height:100%;object-fit:cover;display:block;}
.bd-photo-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:.58rem;font-weight:700;text-align:center;padding:3px;}
.bd-photo-del{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;border:none;color:#fff;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.bd-photo-add-cell{border-radius:9px;aspect-ratio:1;border:2.5px dashed var(--border);background:var(--gold-pale);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;position:relative;transition:border-color .2s;}
.bd-photo-add-cell:hover{border-color:var(--gold);}
.bd-photo-add-cell .ai{font-size:1.5rem;}
.bd-photo-add-cell .at{font-size:.6rem;color:var(--text-muted);font-weight:700;}
.bd-photo-add-cell input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.bd-memo{padding:0 14px 12px;}
.bd-memo-lbl{font-size:.72rem;font-weight:700;color:var(--text-muted);margin-bottom:5px;}
.bd-memo textarea{width:100%;border:2px solid var(--border);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:.83rem;background:var(--gold-pale);color:var(--text);resize:none;outline:none;transition:border-color .2s;min-height:56px;}
.bd-memo textarea:focus{border-color:var(--gold);}

/* ── puppies tab ── */
.litter-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;border-left:5px solid var(--puppy);}
.litter-header{background:linear-gradient(135deg,#5B3E8A,var(--puppy));padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.litter-header h3{color:#fff;font-size:.9rem;font-weight:900;}
.litter-toggle{color:#fff;font-size:1rem;}
.litter-body{padding:14px;}
.vax-row{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.vax-chip{flex:1;min-width:90px;border-radius:9px;padding:7px 10px;border:2px solid var(--border);text-align:center;background:var(--gold-pale);}
.vax-chip .vc-label{font-size:.62rem;color:var(--text-muted);margin-bottom:2px;}
.vax-chip .vc-date{font-size:.82rem;font-weight:900;color:var(--brown);}
.vax-chip.done{background:#EEF7E0;border-color:#8BC34A;}
.vax-chip.done .vc-date{color:#5A9E1A;}
.vax-chip.overdue{background:#FFEDE5;border-color:#FF6B35;}
.vax-chip.overdue .vc-date{color:#FF6B35;}
.vax-chip.today-due{background:#FFF3CD;border-color:#FFC107;}
.vax-chip.today-due .vc-date{color:#B8860B;}
.litter-puppies{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:7px;margin-top:10px;}
.puppy-card{background:var(--puppy-bg);border-radius:10px;padding:8px;text-align:center;border:2px solid transparent;cursor:pointer;transition:border-color .2s;}
.puppy-card:hover{border-color:var(--puppy);}
.puppy-card .p-photo{width:100%;aspect-ratio:1;border-radius:7px;object-fit:cover;display:block;margin-bottom:5px;}
.puppy-card .p-placeholder{width:100%;aspect-ratio:1;border-radius:7px;background:#E8DFF8;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:5px;}
.puppy-card .p-name{font-size:.7rem;font-weight:700;color:var(--puppy);}
.puppy-card .p-sex{font-size:.6rem;color:var(--text-muted);}

/* ── forms ── */
.form-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
.form-card h3{font-size:.95rem;font-weight:900;color:var(--brown);margin-bottom:14px;}
.form-group{margin-bottom:12px;}
.form-group label{font-size:.8rem;font-weight:700;color:var(--text-muted);display:block;margin-bottom:5px;}
.form-group select,.form-group input[type="date"],.form-group input[type="text"],.form-group input[type="number"]{
  width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:9px;
  font-family:inherit;font-size:.92rem;background:var(--gold-pale);color:var(--text);
  appearance:none;outline:none;transition:border-color .2s;}
.form-group select:focus,.form-group input:focus{border-color:var(--gold);}
.sex-toggle{display:flex;gap:8px;}
.sex-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:9px;background:var(--gold-pale);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text-muted);}
.sex-btn.female.active{background:var(--female-bg);border-color:var(--female);color:var(--female);}
.sex-btn.male.active{background:var(--male-bg);border-color:var(--male);color:var(--male);}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--brown-light));color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:.95rem;font-weight:900;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.88;}
.btn-sm{padding:8px 16px;font-size:.82rem;border-radius:8px;width:auto;}
.btn-outline{background:none;border:2px solid var(--gold);color:var(--gold);padding:8px 16px;font-size:.82rem;border-radius:8px;width:auto;font-family:inherit;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-outline:hover{background:var(--gold);color:#fff;}
.btn-cancel{background:linear-gradient(135deg,#aaa,#888);}

/* ── photo upload ── */
.photo-upload-wrap{position:relative;width:100%;height:150px;border:2.5px dashed var(--border);border-radius:13px;overflow:hidden;background:var(--gold-pale);cursor:pointer;margin-bottom:14px;transition:border-color .2s;}
.photo-upload-wrap:hover{border-color:var(--gold);}
.photo-upload-wrap input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2;}
.photo-upload-wrap .pu-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.photo-upload-wrap .pu-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.8rem;color:var(--text-muted);gap:5px;z-index:0;pointer-events:none;}
.photo-upload-wrap .pu-hint .ph-icon{font-size:2rem;}
.photo-upload-wrap .pu-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.42);color:#fff;text-align:center;padding:6px;font-size:.75rem;font-weight:700;z-index:1;pointer-events:none;display:none;}

/* ── move log ── */
.move-log{display:flex;flex-direction:column;gap:8px;}
.move-item{background:#fff;border-radius:11px;padding:11px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;}
.move-item .mi-code{font-weight:900;font-size:.9rem;min-width:42px;}
.move-item .mi-code.f{color:var(--female);}
.move-item .mi-code.m{color:var(--male);}
.move-item .mi-route{font-size:.8rem;color:var(--text-muted);flex:1;}
.move-item .mi-date{font-size:.68rem;color:#bbb;}

/* ── lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s;flex-direction:column;gap:10px;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-width:100%;max-height:80vh;border-radius:12px;}
.lightbox-lbl{color:rgba(255,255,255,.7);font-size:.8rem;font-weight:700;}
.lightbox-close{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:50%;border:none;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(0,0,0,.22);transform:translateY(20px);transition:transform .22s;max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-header h2{font-size:1rem;font-weight:900;color:var(--brown);}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-muted);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-actions .btn{flex:1;}

/* ── vaccine popup ── */
.vax-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;}
.vax-popup{background:#fff;border-radius:20px;padding:24px;max-width:360px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.25);}
.vax-popup h2{font-size:1.1rem;font-weight:900;color:var(--brown);margin-bottom:6px;}
.vax-popup .vp-sub{font-size:.82rem;color:var(--text-muted);margin-bottom:16px;}
.vax-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:8px;background:var(--gold-pale);border-left:4px solid var(--gold);}
.vax-item.overdue{background:#FFEDE5;border-left-color:#FF6B35;}
.vax-item.today{background:#FFF3CD;border-left-color:#FFC107;}
.vax-item .vi-icon{font-size:1.4rem;}
.vax-item .vi-info{flex:1;}
.vax-item .vi-title{font-size:.85rem;font-weight:700;}
.vax-item .vi-date{font-size:.72rem;color:var(--text-muted);}

/* ── toast ── */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);color:#fff;padding:11px 20px;border-radius:99px;font-weight:700;font-size:.88rem;transition:transform .3s;z-index:999;box-shadow:0 4px 18px rgba(0,0,0,.18);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

.paw-bg{position:fixed;right:-30px;bottom:-30px;font-size:160px;opacity:.04;pointer-events:none;z-index:0;transform:rotate(-20deg);}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="paw-bg">🐾</div>

<header>
  <h1>🐕 골디 셸터 농장 관리</h1>
  <p>골든리트리버 번식·견사 통합 관리</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('dogs')">🐶 개체</div>
  <div class="tab" onclick="showTab('kennels')">🏠 견사</div>
  <div class="tab" onclick="showTab('breeding')">🌸 번식</div>
  <div class="tab" onclick="showTab('puppies')">🐾 새끼</div>
  <div class="tab" onclick="showTab('move')">🔄 이동</div>
</div>

<div class="content">

  <!-- ── 개체 탭 ── -->
  <div id="tab-dogs">
    <div class="sec-title">🐕‍🦺 모견 <span class="badge" id="female-count"></span></div>
    <button class="add-dog-btn" onclick="openAddDog('female')">＋ 모견 추가</button>
    <div class="dog-grid" id="female-grid"></div>

    <div class="sec-title">🐕 부견 <span class="badge" id="male-count"></span></div>
    <button class="add-dog-btn" onclick="openAddDog('male')">＋ 부견 추가</button>
    <div class="dog-grid" id="male-grid"></div>

    <div class="detail-panel" id="dog-detail"></div>
  </div>

  <!-- ── 견사 탭 ── -->
  <div id="tab-kennels" class="hidden">
    <div class="sec-title">🏠 견사 현황</div>
    <div class="kennel-grid" id="kennel-grid"></div>
  </div>

  <!-- ── 번식 탭 ── -->
  <div id="tab-breeding" class="hidden">
    <div class="sec-title">🌸 교배 현황</div>
    <div class="breeding-list" id="breeding-list"></div>
    <div style="margin-top:20px;" class="sec-title">교배 등록</div>
    <div class="form-card">
      <div class="form-group"><label>모견</label><select id="b-female"></select></div>
      <div class="form-group"><label>부견</label><select id="b-male"></select></div>
      <div class="form-group"><label>교배일</label><input type="date" id="b-date"></div>
      <button class="btn" onclick="registerBreeding()">출산 예정일 계산 및 등록</button>
    </div>
  </div>

    <button class="add-dog-btn" onclick="openAddLitter()">＋ 출산 기록 추가</button>

  <!-- ── 이동 탭 ── -->

    <div class="form-card">

      <div class="form-group"><label>이동할 견사</label><select id="m-kennel"></select></div>

</div>

    <div class="photo-upload-wrap" id="dm-photo-wrap">

<div class="modal-overlay" id="litter-modal" onclick="handleLitterModalOverlay(event)">

    <div class="modal-header">
      <h2 id="litter-modal-title">출산 기록 추가</h2>

    <div class="form-group"><label>모견</label><select id="lm-female"></select></div>

<!-- ── 백신 알림 팝업 ── -->
<div class="vax-popup-overlay hidden" id="vax-popup-overlay">
  <div class="vax-popup">
    <h2>💉 오늘의 백신 알림</h2>
    <p class="vp-sub">오늘 또는 지난 백신 일정이 있어요!</p>
    <div id="vax-popup-list"></div>
    <button class="btn" style="margin-top:8px;" onclick="closeVaxPopup()">확인했어요 ✓</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  기본 데이터
// ═══════════════════════════════════════
const KENNELS=['1번','2번','3번','4번','5번','6번','7번','8번','9번','10번','11번','12번','A1','A2','A3','B1','B2','B3'];
const GESTATION=63;

function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function daysFrom(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function fmtDate(d){return d?d.replace(/-/g,'.'):'−';}
function today(){return new Date().toISOString().slice(0,10);}

// 샘플 모견 (F01~F20)
const females=Array.from({length:20},(_,i)=>({
  code:`F${String(i+1).padStart(2,'0')}`,sex:'female',
  kennel:KENNELS[i%KENNELS.length],
  birth:`${2020+(i%4)}-${String((i%12)+1).padStart(2,'0')}-${String((i%28)+1).padStart(2,'0')}`,
  photo:null,breeding:null,dueDate:null,mateCode:null
}));

// 샘플 부견 (M01~M05)
const males=Array.from({length:5},(_,i)=>({
  code:`M0${i+1}`,sex:'male',
  kennel:KENNELS[12+(i%6)],
  birth:`${2019+(i%3)}-${String((i%12)+1).padStart(2,'0')}-15`,
  photo:null,breeding:null,dueDate:null,mateCode:null
}));

// 샘플 교배
const breedingRecords=[
  {femaleCode:'F01',maleCode:'M01',matingDate:addDays(today(),-50),dueDate:addDays(today(),13),photos:[],memo:''},
  {femaleCode:'F05',maleCode:'M02',matingDate:addDays(today(),-30),dueDate:addDays(today(),33),photos:[],memo:''},
  {femaleCode:'F12',maleCode:'M03',matingDate:addDays(today(),-10),dueDate:addDays(today(),53),photos:[],memo:''},
];
breedingRecords.forEach(b=>{
  const f=females.find(x=>x.code===b.femaleCode);
  if(f){f.breeding=b.matingDate;f.dueDate=b.dueDate;f.mateCode=b.maleCode;}
});

// 출산 기록 (litters)
// litter: { id, femaleCode, maleCode, birthA, birthB, count, puppies:[], vax1,vax2,vax3, deworm1,deworm2 }
const litters=[];
let litterIdSeq=1;

function makeLitter(femaleCode,maleCode,birthA,birthB,count){
  const vax1=addDays(birthA,25);
  const vax2=addDays(birthA,35);
  const vax3=addDays(birthA,45);
  const deworm1=addDays(birthA,14);
  const deworm2=addDays(birthA,28);
  const puppies=Array.from({length:count},(_,i)=>({
    id:i+1,name:`새끼${i+1}`,sex:'unknown',photo:null
  }));
  return {id:litterIdSeq++,femaleCode,maleCode,birthA,birthB,count,puppies,vax1,vax2,vax3,deworm1,deworm2};
}

// 이동 기록
const moveLog=[
  {code:'F03',sex:'female',from:'3번',to:'5번',date:addDays(today(),-7)},
  {code:'M02',sex:'male',from:'A1',to:'B2',date:addDays(today(),-14)},
];

let selectedDog=null;
let openBreedingIdx=null;

function allDogs(){return[...females,...males];}

// ═══════════════════════════════════════
//  탭
// ═══════════════════════════════════════
function showTab(tab){
  ['dogs','kennels','breeding','puppies','move'].forEach(t=>
    document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab));
  document.querySelectorAll('.tab').forEach((el,i)=>
    el.classList.toggle('active',['dogs','kennels','breeding','puppies','move'][i]===tab));
  if(tab==='kennels')renderKennels();
  if(tab==='breeding')renderBreeding();
  if(tab==='puppies')renderPuppies();
  if(tab==='move')renderMove();
}

// ═══════════════════════════════════════
//  개체 탭
// ═══════════════════════════════════════
function renderDogs(){
  const fg=document.getElementById('female-grid');
  const mg=document.getElementById('male-grid');
  document.getElementById('female-count').textContent=females.length;
  document.getElementById('male-count').textContent=males.length;
  fg.innerHTML='';mg.innerHTML='';
  allDogs().forEach(dog=>{
    const grid=dog.sex==='female'?fg:mg;
    const dl=dog.dueDate?daysFrom(dog.dueDate):null;
    const soon=dl!==null&&dl<=14&&dl>=0;
    const card=document.createElement('div');
    card.className=`dog-card ${dog.sex}${selectedDog?.code===dog.code?' selected':''}`;
    const photoEl=dog.photo
      ?`<img class="dog-photo" src="${dog.photo}" alt="${dog.code}">`
      :`<div class="dog-photo-placeholder">${dog.sex==='female'?'🐕‍🦺':'🐕'}</div>`;
    card.innerHTML=`${photoEl}
      <button class="edit-btn" title="수정">✏️</button>
      ${soon?`<div class="due-badge">D-${dl}</div>`:
        (dog.dueDate&&dl>=0?`<div class="pregnant-badge">임신중</div>`:'')}
      <div class="dog-card-body">
        <div class="code">${dog.code}</div>
        <div class="kennel-tag">${dog.kennel}</div>
      </div>`;
    card.querySelector('.edit-btn').addEventListener('click',e=>{e.stopPropagation();openEditDog(dog.code);});
    card.addEventListener('click',()=>selectDog(dog.code));
    grid.appendChild(card);
  });
}

function selectDog(code){
  const dog=allDogs().find(d=>d.code===code);
  if(!dog)return;
  selectedDog=dog;
  renderDogs();
  const panel=document.getElementById('dog-detail');
  panel.classList.add('show');
  const age=Math.floor((new Date()-new Date(dog.birth))/86400000/365.25);
  const dl=dog.dueDate?daysFrom(dog.dueDate):null;
  const dueTxt=dog.dueDate?(dl<0?`출산완료 (${fmtDate(dog.dueDate)})`:
    `${fmtDate(dog.dueDate)} (D-${dl})`):'-';
  const photoEl=dog.photo
    ?`<img src="${dog.photo}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;">`
    :`<div style="font-size:2.6rem;">${dog.sex==='female'?'🐕‍🦺':'🐕'}</div>`;
  panel.innerHTML=`
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;">
      <div>${photoEl}</div>
      <div style="flex:1;"><div style="font-size:1rem;font-weight:900;color:var(--brown);margin-bottom:4px;">${dog.sex==='female'?'🐕‍🦺 모견':'🐕 부견'} ${dog.code}</div></div>
      <button class="btn-outline" onclick="openEditDog('${dog.code}')">✏️ 수정</button>
    </div>
    <div class="info-row">
      <div class="info-item"><div class="label">현재 견사</div><div class="value">${dog.kennel}</div></div>
      <div class="info-item"><div class="label">생년월일</div><div class="value">${fmtDate(dog.birth)}</div></div>
      <div class="info-item"><div class="label">나이</div><div class="value">약 ${age}세</div></div>
      ${dog.sex==='female'?`
      <div class="info-item"><div class="label">교배일</div><div class="value">${fmtDate(dog.breeding)||'-'}</div></div>
      <div class="info-item"><div class="label">교배 상대</div><div class="value">${dog.mateCode||'-'}</div></div>
      <div class="info-item"><div class="label">출산 예정일</div><div class="value">${dueTxt}</div></div>`:''}
    </div>`;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ═══════════════════════════════════════
//  개체 추가 / 편집 모달
// ═══════════════════════════════════════
let dogModalMode='add'; // 'add' | 'edit'
let dogEditCode=null;
let dogPendingPhoto=null;
let dogSelectedSex='female';

function openAddDog(sex){
  dogModalMode='add'; dogEditCode=null; dogPendingPhoto=null; dogSelectedSex=sex;
  document.getElementById('dog-modal-title').textContent=sex==='female'?'🐕‍🦺 모견 추가':'🐕 부견 추가';
  document.getElementById('dm-code').value='';
  document.getElementById('dm-birth').value=today();
  document.getElementById('dm-kennel').innerHTML=KENNELS.map(k=>`<option>${k}</option>`).join('');
  resetPhotoWrap('dm-photo-wrap','dm-photo-input','dm-hint','dm-overlay',null);
  selectSex(sex);
  document.getElementById('dog-modal').classList.add('open');
}

function openEditDog(code){
  const dog=allDogs().find(d=>d.code===code);
  if(!dog)return;
  dogModalMode='edit'; dogEditCode=code; dogPendingPhoto=null; dogSelectedSex=dog.sex;
  document.getElementById('dog-modal-title').textContent=`${dog.sex==='female'?'🐕‍🦺 모견':'🐕 부견'} ${dog.code} 수정`;
  document.getElementById('dm-code').value=dog.code;
  document.getElementById('dm-birth').value=dog.birth;
  document.getElementById('dm-kennel').innerHTML=KENNELS.map(k=>`<option${k===dog.kennel?' selected':''}>${k}</option>`).join('');
  resetPhotoWrap('dm-photo-wrap','dm-photo-input','dm-hint','dm-overlay',dog.photo);
  selectSex(dog.sex);
  document.getElementById('dog-modal').classList.add('open');
}

function selectSex(sex){
  dogSelectedSex=sex;
  document.getElementById('sex-btn-female').classList.toggle('active',sex==='female');
  document.getElementById('sex-btn-male').classList.toggle('active',sex==='male');
}

function handleDogModalOverlay(e){if(e.target===document.getElementById('dog-modal'))closeDogModal();}
function closeDogModal(){document.getElementById('dog-modal').classList.remove('open');}

function handleDogPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    dogPendingPhoto=ev.target.result;
    setPhotoPreview('dm-photo-wrap','dm-hint','dm-overlay',dogPendingPhoto);
  };r.readAsDataURL(file);
}

function saveDog(){
  const code=document.getElementById('dm-code').value.trim();
  const kennel=document.getElementById('dm-kennel').value;
  const birth=document.getElementById('dm-birth').value;
  if(!code){showToast('번호를 입력해주세요');return;}
  if(!birth){showToast('생년월일을 입력해주세요');return;}

  if(dogModalMode==='add'){
    if(allDogs().some(d=>d.code===code)){showToast('이미 사용 중인 번호예요');return;}
    const newDog={code,sex:dogSelectedSex,kennel,birth,photo:dogPendingPhoto,breeding:null,dueDate:null,mateCode:null};
    if(dogSelectedSex==='female')females.push(newDog);
    else males.push(newDog);
    showToast(`✅ ${code} 추가 완료!`);
  } else {
    const dog=allDogs().find(d=>d.code===dogEditCode);
    if(!dog)return;
    if(code!==dogEditCode&&allDogs().some(d=>d.code===code)){showToast('이미 사용 중인 번호예요');return;}
    const oldCode=dog.code;
    dog.code=code; dog.kennel=kennel; dog.birth=birth;
    if(dogPendingPhoto!==null)dog.photo=dogPendingPhoto;
    // 코드 연동 업데이트
    breedingRecords.forEach(b=>{if(b.femaleCode===oldCode)b.femaleCode=code;if(b.maleCode===oldCode)b.maleCode=code;});
    moveLog.forEach(m=>{if(m.code===oldCode)m.code=code;});
    litters.forEach(l=>{if(l.femaleCode===oldCode)l.femaleCode=code;if(l.maleCode===oldCode)l.maleCode=code;});
    allDogs().forEach(d=>{if(d.mateCode===oldCode)d.mateCode=code;});
    showToast(`✅ ${oldCode} → ${code} 수정 완료!`);
  }
  closeDogModal(); renderDogs();
  if(selectedDog?.code===dogEditCode) selectDog(document.getElementById('dm-code').value.trim());
}

// ═══════════════════════════════════════
//  견사 탭
// ═══════════════════════════════════════
function renderKennels(){
  const grid=document.getElementById('kennel-grid');grid.innerHTML='';
  KENNELS.forEach(k=>{
    const dogs=allDogs().filter(d=>d.kennel===k);
    const box=document.createElement('div');box.className='kennel-box';
    box.innerHTML=`<div class="kname">🏠 ${k}</div>
      ${dogs.length===0?'<div class="kennel-empty">비어있음</div>':
        dogs.map(d=>`<span class="kennel-dog ${d.sex==='female'?'f':'m'}">${d.code}</span>`).join('')}`;
    box.onclick=()=>{if(dogs.length){selectDog(dogs[0].code);showTab('dogs');}};
    grid.appendChild(box);
  });
}

// ═══════════════════════════════════════
//  번식 탭
// ═══════════════════════════════════════
function renderBreeding(){
  const list=document.getElementById('breeding-list');list.innerHTML='';
  document.getElementById('b-female').innerHTML=females.map(f=>`<option value="${f.code}">${f.code} (${f.kennel})</option>`).join('');
  document.getElementById('b-male').innerHTML=males.map(m=>`<option value="${m.code}">${m.code} (${m.kennel})</option>`).join('');
  document.getElementById('b-date').value=today();
  if(!breedingRecords.length){
    list.innerHTML='<div style="color:#bbb;text-align:center;padding:20px;">등록된 교배 기록이 없습니다</div>';return;
  }
  const sorted=breedingRecords.map((b,i)=>({b,i})).sort((a,z)=>new Date(a.b.dueDate)-new Date(z.b.dueDate));
  sorted.forEach(({b,i})=>{
    const dl=daysFrom(b.dueDate);
    const soon=dl>=0&&dl<=14;
    const isOpen=openBreedingIdx===i;
    const photos=b.photos||[];

    const card=document.createElement('div');
    card.className=`breeding-card ${soon?'due-soon':''}${isOpen?' bc-open':''}`;

    // 썸네일 row (최대 4장)
    const thumbHtml=photos.slice(0,4).map(p=>`<img class="bc-thumb" src="${p.src}">`).join('')+
      (photos.length>4?`<div class="bc-thumb-more">+${photos.length-4}</div>`:'');

    card.innerHTML=`
      <div class="bc-body">
        <div class="bc-top">
          <div class="bc-title">🐕‍🦺 ${b.femaleCode} × 🐕 ${b.maleCode}</div>
          <div class="bc-days">${dl<0?'출산완료':`D-${dl}`}</div>
        </div>
        <div class="bc-info">교배일: ${fmtDate(b.matingDate)} &nbsp;|&nbsp; 출산 예정: ${fmtDate(b.dueDate)}</div>
        ${photos.length?`<div class="bc-thumb-row">${thumbHtml}</div>`:''}
      </div>`;
    card.addEventListener('click',()=>toggleBreedingDetail(i));
    list.appendChild(card);

    // 상세 패널 (열린 경우)
    if(isOpen){
      const detail=document.createElement('div');
      detail.className='breeding-detail show';
      const photoGrid=photos.map((p,pi)=>`
        <div class="bd-photo-cell">
          <img src="${p.src}" alt="사진" onclick="openLightbox('${p.src}','${p.label||''}')">
          <div class="bd-photo-label">${p.label||''}</div>
          <button class="bd-photo-del" onclick="deleteBreedingPhoto(${i},${pi})">✕</button>
        </div>`).join('');
      detail.innerHTML=`
        <div class="bd-header">
          <h3>🌸 ${b.femaleCode} × ${b.maleCode} 상세</h3>
          <button class="bd-close" onclick="toggleBreedingDetail(${i})">✕</button>
        </div>
        <div class="bd-info-strip">
          <div class="bd-info-cell"><div class="lbl">교배일</div><div class="val">${fmtDate(b.matingDate)}</div></div>
          <div class="bd-info-cell"><div class="lbl">출산 예정일</div><div class="val">${fmtDate(b.dueDate)}</div></div>
          <div class="bd-info-cell"><div class="lbl">D-Day</div><div class="val">${dl<0?'출산완료':`D-${dl}`}</div></div>
        </div>
        <div class="bd-photos-section">
          <div class="bd-photos-title">
            📷 사진 기록
            <span class="bd-photo-count">${photos.length}장</span>
          </div>
          <div class="bd-photo-grid">
            ${photoGrid}
            <div class="bd-photo-add-cell">
              <div class="ai">📷</div>
              <div class="at">사진 추가</div>
              <input type="file" accept="image/*" multiple onchange="addBreedingPhotos(event,${i})">
            </div>
          </div>
        </div>
        <div class="bd-memo">
          <div class="bd-memo-lbl">📝 메모</div>
          <textarea placeholder="교배 관련 메모를 남겨보세요" onchange="saveBreedingMemo(${i},this.value)">${b.memo||''}</textarea>
        </div>`;
      list.appendChild(detail);
    }
  });
}

function toggleBreedingDetail(idx){
  openBreedingIdx=openBreedingIdx===idx?null:idx;
  renderBreeding();
  // 열린 패널로 스크롤
  setTimeout(()=>{
    const panels=document.querySelectorAll('.breeding-detail.show');
    if(panels.length)panels[0].scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

function addBreedingPhotos(e,idx){
  const files=Array.from(e.target.files);if(!files.length)return;
  if(!breedingRecords[idx].photos)breedingRecords[idx].photos=[];
  let loaded=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=ev=>{
      const elapsed=Math.abs(daysFrom(breedingRecords[idx].matingDate));
      breedingRecords[idx].photos.push({src:ev.target.result,label:`D+${elapsed}`});
      loaded++;
      if(loaded===files.length){showToast(`📷 사진 ${files.length}장 추가됐어요!`);renderBreeding();}
    };r.readAsDataURL(file);
  });
}

function deleteBreedingPhoto(idx,pi){
  breedingRecords[idx].photos.splice(pi,1);
  showToast('사진을 삭제했어요');renderBreeding();
}

function saveBreedingMemo(idx,val){breedingRecords[idx].memo=val;}

function registerBreeding(){
  const fCode=document.getElementById('b-female').value;
  const mCode=document.getElementById('b-male').value;
  const mDate=document.getElementById('b-date').value;
  if(!mDate){showToast('교배일을 입력해주세요');return;}
  const due=addDays(mDate,GESTATION);
  const f=females.find(x=>x.code===fCode);
  if(f){f.breeding=mDate;f.dueDate=due;f.mateCode=mCode;}
  breedingRecords.push({femaleCode:fCode,maleCode:mCode,matingDate:mDate,dueDate:due,photos:[],memo:''});
  showToast(`✅ ${fCode} 출산 예정일: ${fmtDate(due)}`);
  renderBreeding();renderDogs();
}

// ═══════════════════════════════════════
//  새끼 탭
// ═══════════════════════════════════════
function renderPuppies(){
  const list=document.getElementById('litter-list');list.innerHTML='';
  document.getElementById('lm-female').innerHTML=females.map(f=>`<option value="${f.code}">${f.code}</option>`).join('');
  document.getElementById('lm-male').innerHTML=males.map(m=>`<option value="${m.code}">${m.code}</option>`).join('');

  if(!litters.length){
    list.innerHTML='<div style="color:#bbb;text-align:center;padding:30px;">출산 기록이 없어요<br><small>위 버튼을 눌러 추가하세요</small></div>';
    return;
  }

  litters.forEach((lt,li)=>{
    const card=document.createElement('div');
    card.className='litter-card';

    function vaxClass(dateStr){
      if(!dateStr)return'';
      const d=daysFrom(dateStr);
      if(d<-1)return'done';
      if(d===0||d===-1)return'today-due';
      if(d<0)return'overdue';
      return'';
    }
    function vaxLabel(dateStr,base){
      if(!dateStr)return'미정';
      const d=daysFrom(dateStr);
      if(d<-1)return`${fmtDate(dateStr)} ✓`;
      if(d===0)return`오늘! 🔔`;
      if(d===-1)return`어제 ⚠️`;
      if(d<0)return`${fmtDate(dateStr)} ⚠️`;
      return fmtDate(dateStr);
    }

    const puppyCards=lt.puppies.map((p,pi)=>`
      <div class="puppy-card" onclick="openPuppyEdit(${li},${pi})">
        ${p.photo?`<img class="p-photo" src="${p.photo}" alt="${p.name}">`:`<div class="p-placeholder">🐶</div>`}
        <div class="p-name">${p.name}</div>
        <div class="p-sex">${p.sex==='female'?'♀ 암':'p.sex'==='male'?'♂ 수':'미정'}</div>
      </div>`).join('');

    card.innerHTML=`
      <div class="litter-header" onclick="toggleLitter(this)">
        <h3>🐾 ${lt.femaleCode} × ${lt.maleCode} &nbsp;·&nbsp; 출산일 ${fmtDate(lt.birthA)}</h3>
        <span class="litter-toggle">▼</span>
      </div>
      <div class="litter-body">
        <div class="vax-row">
          <div class="vax-chip ${vaxClass(lt.vax1)}">
            <div class="vc-label">💉 1차 백신</div>
            <div class="vc-date">${vaxLabel(lt.vax1)}</div>
          </div>
          <div class="vax-chip ${vaxClass(lt.vax2)}">
            <div class="vc-label">💉 2차 백신</div>
            <div class="vc-date">${vaxLabel(lt.vax2)}</div>
          </div>
          <div class="vax-chip ${vaxClass(lt.vax3)}">
            <div class="vc-label">💉 3차 백신</div>
            <div class="vc-date">${vaxLabel(lt.vax3)}</div>
          </div>
        </div>
        <div class="vax-row">
          <div class="vax-chip ${vaxClass(lt.deworm1)}">
            <div class="vc-label">🪱 1차 구충</div>
            <div class="vc-date">${vaxLabel(lt.deworm1)}</div>
          </div>
          <div class="vax-chip ${vaxClass(lt.deworm2)}">
            <div class="vc-label">🪱 2차 구충</div>
            <div class="vc-date">${vaxLabel(lt.deworm2)}</div>
          </div>
          <div class="vax-chip">
            <div class="vc-label">출산일 B</div>
            <div class="vc-date">${fmtDate(lt.birthB)||'−'}</div>
          </div>
        </div>
        <div style="font-size:.8rem;font-weight:700;color:var(--text-muted);margin:10px 0 6px;">🐶 새끼 ${lt.count}마리</div>
        <div class="litter-puppies">${puppyCards}</div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleLitter(header){
  const body=header.nextElementSibling;
  const toggle=header.querySelector('.litter-toggle');
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  toggle.textContent=isOpen?'▶':'▼';
}

// 출산 기록 추가 모달
function openAddLitter(){
  document.getElementById('lm-birth-a').value=today();
  document.getElementById('lm-birth-b').value='';
  document.getElementById('lm-count').value=1;
  document.getElementById('lm-female').innerHTML=females.map(f=>`<option value="${f.code}">${f.code}</option>`).join('');
  document.getElementById('lm-male').innerHTML=males.map(m=>`<option value="${m.code}">${m.code}</option>`).join('');
  document.getElementById('litter-modal').classList.add('open');
}
function handleLitterModalOverlay(e){if(e.target===document.getElementById('litter-modal'))closeLitterModal();}
function closeLitterModal(){document.getElementById('litter-modal').classList.remove('open');}
function saveLitter(){
  const fCode=document.getElementById('lm-female').value;
  const mCode=document.getElementById('lm-male').value;
  const birthA=document.getElementById('lm-birth-a').value;
  const birthB=document.getElementById('lm-birth-b').value;
  const count=parseInt(document.getElementById('lm-count').value)||1;
  if(!birthA){showToast('출산일 A를 입력해주세요');return;}
  litters.push(makeLitter(fCode,mCode,birthA,birthB,count));
  closeLitterModal();
  showToast(`✅ ${fCode} 출산 기록 등록됐어요!`);
  renderPuppies();
}

// 개별 강아지 편집 (간단히 토스트로 처리, 추후 확장 가능)
function openPuppyEdit(li,pi){
  const p=litters[li].puppies[pi];
  const name=prompt('강아지 이름을 입력하세요',p.name);
  if(name===null)return;
  p.name=name||p.name;
  renderPuppies();
}

// ═══════════════════════════════════════
//  백신 알림 팝업
// ═══════════════════════════════════════
function checkVaxAlerts(){
  const alerts=[];
  litters.forEach(lt=>{
    const checks=[
      {date:lt.vax1,label:`${lt.femaleCode}×${lt.maleCode} 새끼 💉1차 백신`},
      {date:lt.vax2,label:`${lt.femaleCode}×${lt.maleCode} 새끼 💉2차 백신`},
      {date:lt.vax3,label:`${lt.femaleCode}×${lt.maleCode} 새끼 💉3차 백신`},
      {date:lt.deworm1,label:`${lt.femaleCode}×${lt.maleCode} 새끼 🪱1차 구충`},
      {date:lt.deworm2,label:`${lt.femaleCode}×${lt.maleCode} 새끼 🪱2차 구충`},
    ];
    checks.forEach(c=>{
      if(!c.date)return;
      const d=daysFrom(c.date);
      if(d===0)alerts.push({...c,type:'today',msg:'오늘이에요!'});
      else if(d===-1)alerts.push({...c,type:'overdue',msg:'어제였어요!'});
      else if(d<0&&d>=-3)alerts.push({...c,type:'overdue',msg:`${Math.abs(d)}일 지났어요`});
    });
  });
  if(!alerts.length)return;
  const popup=document.getElementById('vax-popup-overlay');
  const plist=document.getElementById('vax-popup-list');
  plist.innerHTML=alerts.map(a=>`
    <div class="vax-item ${a.type}">
      <div class="vi-icon">${a.label.includes('백신')?'💉':'🪱'}</div>
      <div class="vi-info">
        <div class="vi-title">${a.label}</div>
        <div class="vi-date">${fmtDate(a.date)} · ${a.msg}</div>
      </div>
    </div>`).join('');
  popup.classList.remove('hidden');
}
function closeVaxPopup(){document.getElementById('vax-popup-overlay').classList.add('hidden');}

// ═══════════════════════════════════════
//  이동 탭
// ═══════════════════════════════════════
function renderMove(){
  document.getElementById('m-dog').innerHTML=allDogs().map(d=>`<option value="${d.code}">${d.code} (현재: ${d.kennel})</option>`).join('');
  document.getElementById('m-kennel').innerHTML=KENNELS.map(k=>`<option>${k}</option>`).join('');
  document.getElementById('m-date').value=today();
  renderMoveLog();
}
function moveKennel(){
  const code=document.getElementById('m-dog').value;
  const to=document.getElementById('m-kennel').value;
  const date=document.getElementById('m-date').value;
  const dog=allDogs().find(d=>d.code===code);
  if(!dog)return;
  const from=dog.kennel;
  if(from===to){showToast('같은 견사입니다');return;}
  moveLog.unshift({code:dog.code,sex:dog.sex,from,to,date});
  dog.kennel=to;
  showToast(`✅ ${dog.code}: ${from} → ${to} 이동 완료`);
  renderMove();renderDogs();
}
function renderMoveLog(){
  const log=document.getElementById('move-log');
  if(!moveLog.length){log.innerHTML='<div style="color:#bbb;text-align:center;padding:14px;">이동 기록이 없습니다</div>';return;}
  log.innerHTML=moveLog.map(m=>`
    <div class="move-item">
      <div class="mi-code ${m.sex==='female'?'f':'m'}">${m.code}</div>
      <div class="mi-route">${m.from} → ${m.to}</div>
      <div class="mi-date">${fmtDate(m.date)}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════
//  라이트박스
// ═══════════════════════════════════════
function openLightbox(src,lbl=''){
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox-lbl').textContent=lbl;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ═══════════════════════════════════════
//  사진 공통 헬퍼
// ═══════════════════════════════════════
function resetPhotoWrap(wrapId,inputId,hintId,overlayId,existingSrc){
  const wrap=document.getElementById(wrapId);
  document.getElementById(inputId).value='';
  let prev=wrap.querySelector('.pu-preview');
  if(prev)prev.remove();
  const hint=document.getElementById(hintId);
  const overlay=document.getElementById(overlayId);
  if(existingSrc){
    const img=document.createElement('img');img.className='pu-preview';img.src=existingSrc;
    wrap.appendChild(img);hint.style.display='none';overlay.style.display='block';
  } else {hint.style.display='flex';overlay.style.display='none';}
}
function setPhotoPreview(wrapId,hintId,overlayId,src){
  const wrap=document.getElementById(wrapId);
  let img=wrap.querySelector('.pu-preview');
  if(!img){img=document.createElement('img');img.className='pu-preview';wrap.appendChild(img);}
  img.src=src;
  document.getElementById(hintId).style.display='none';
  document.getElementById(overlayId).style.display='block';
}

// ═══════════════════════════════════════
//  토스트
// ═══════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── 초기 실행 ──
renderDogs();
checkVaxAlerts();
</script>
