<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골디쉼터 분양 계약서</title>
<!-- PDF 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --gold:#C8931A;--gold-l:#F0BE5A;--gold-p:#FDF5E0;
  --br:#5C3D1E;--br-l:#8B6240;
  --cream:#FAFAF7;--white:#fff;
  --gray:#6B6B6B;--gray-l:#E8E6E0;--gray-ll:#F4F3EF;
  --green:#27AE60;--blue:#1E6FBB;
  --r:10px;--sh:0 2px 14px rgba(92,61,30,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--cream);color:var(--br);min-height:100vh}

/* HEADER */
header{background:var(--br);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.logo{font-size:18px;color:var(--gold-l);font-weight:800}
.page-ttl{font-size:13px;color:rgba(255,255,255,.6);margin-left:6px}

/* STEP BAR */
.step-bar{background:var(--white);border-bottom:1px solid var(--gray-l);padding:14px 20px;display:flex;gap:0;justify-content:center;position:sticky;top:52px;z-index:90}
.step-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--gray-l)}
.step-item.active{color:var(--gold)}
.step-item.done{color:var(--green)}
.step-num{width:24px;height:24px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.step-done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-arrow{color:var(--gray-l);margin:0 10px;font-size:14px}

/* CONTAINER */
.container{max-width:720px;margin:0 auto;padding:24px 16px 60px}

/* STEP PANELS */
.step-panel{display:none}
.step-panel.active{display:block}

/* CARD */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--gray-l);padding:22px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;padding-bottom:5px;border-bottom:1.5px solid var(--gold-l)}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fc1{grid-template-columns:1fr}
.ffield{display:flex;flex-direction:column;gap:4px}
.ffield label{font-size:12px;font-weight:700;color:var(--br-l)}
.ffield label .req{color:#C0392B;margin-left:2px}
.ffield input,.ffield select,.ffield textarea{border:1.5px solid var(--gray-l);border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--br);background:#fff;outline:none;width:100%;transition:border-color .15s}
.ffield input:focus,.ffield select:focus,.ffield textarea:focus{border-color:var(--gold)}
.ffield input[readonly]{background:var(--gold-p);color:var(--br-l);cursor:default}
.ffield textarea{resize:vertical;min-height:70px}

/* INFO CHIPS */
.info-chips{display:flex;flex-wrap:wrap;gap:6px 16px;padding:12px 14px;background:var(--gold-p);border-radius:8px;font-size:12px;margin-bottom:16px}
.chip{display:flex;gap:5px}
.chip-k{color:var(--gray);font-weight:600}
.chip-v{color:var(--br);font-weight:700}

/* ════════════════════════
   계약서 PREVIEW (STEP2)
════════════════════════ */
#contractPreview{background:#fff;padding:28px 28px;border:1px solid var(--gray-l);border-radius:var(--r);font-size:12.5px;line-height:1.85;color:#222}
.cv-header{text-align:center;margin-bottom:22px;border-bottom:2px solid #5C3D1E;padding-bottom:14px}
.cv-header h1{font-size:18px;font-weight:900;letter-spacing:3px;color:#5C3D1E;margin-bottom:4px}
.cv-header p{font-size:11px;color:#888}
.cv-table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:12px}
.cv-table th{background:#5C3D1E;color:#F0BE5A;padding:7px 10px;text-align:left;font-weight:700;width:110px}
.cv-table td{padding:7px 10px;border:1px solid #ddd;vertical-align:top}
.cv-table tr:nth-child(even) td{background:#fafafa}
.cv-section{font-size:12px;font-weight:800;color:#5C3D1E;margin:14px 0 6px;letter-spacing:.5px}
.cv-clause{margin-bottom:6px;padding:7px 10px;background:#FDF5E0;border-left:3px solid #C8931A;border-radius:0 4px 4px 0;font-size:11.5px}
.cv-clause strong{font-weight:800}
.cv-legal{background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:10px 12px;font-size:11px;color:#555;margin-top:10px;line-height:1.7}
.cv-sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;border-top:1px solid #ddd;padding-top:16px}
.sign-box{border:1px dashed #ccc;border-radius:6px;padding:12px;text-align:center}
.sign-box .s-label{font-size:11px;color:#888;font-weight:700;margin-bottom:6px}
.sign-box .s-name{font-size:15px;font-weight:800;color:#5C3D1E;min-height:24px}
.sign-box .s-date{font-size:11px;color:#888;margin-top:4px}

/* 전자서명 캔버스 */
#signCanvas{border:2px solid var(--gray-l);border-radius:8px;cursor:crosshair;display:block;max-width:100%;touch-action:none;background:#fff}

/* BUTTONS */
.btn{padding:11px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:var(--br)}
.btn-br{background:var(--br);color:#fff}
.btn-br:hover{background:#3a250f}
.btn-gray{background:var(--gray-l);color:var(--br)}
.btn-gray:hover{background:#d8d5ce}
.btn-green{background:var(--green);color:#fff}
.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:space-between;flex-wrap:wrap}

/* COMPLETE */
.complete-box{text-align:center;padding:40px 20px}
.complete-icon{font-size:64px;margin-bottom:16px}
.complete-title{font-size:22px;font-weight:800;color:var(--br);margin-bottom:8px}
.complete-sub{font-size:14px;color:var(--gray);margin-bottom:28px;line-height:1.7}

/* DUPLICATE WARNING */
.warn-box{background:#FFF3E0;border:1.5px solid #E67E22;border-radius:8px;padding:16px 20px;text-align:center;font-size:14px;font-weight:700;color:#E67E22;margin-bottom:16px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--gray-l);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--br);color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@media print{header,.step-bar,.btn-row{display:none!important}body{background:#fff}.container{padding:0;max-width:100%}#contractPreview{border:none;box-shadow:none}}
@media(max-width:560px){.fgrid{grid-template-columns:1fr}.cv-sign{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>

    <div class="btn-row">

  <!-- ── STEP2: 계약서 미리보기 -->
  <div class="step-panel" id="step2">
    <div class="card">

  const v=String(s||'').toLowerCase();

window.goStep=n=>{
  document.querySelectorAll('.step-panel').forEach(p=>p.classList.remove('active'));

  window.scrollTo({top:0,behavior:'smooth'});
  // 스텝바 업데이트
  [1,2,3,4].forEach(i=>{
    const el=document.getElementById('si'+i);
    el.classList.remove('active','done');
    if(i<n) el.classList.add('done');
    if(i===n) el.classList.add('active');
  });
};

  document.getElementById('f_saledate').value= fmt(G.saledate);

  document.getElementById('dogInfo').innerHTML=`

    <div class="chip"><span class="chip-k">분양가</span><span class="chip-v">${numFmt(G.price)}</span></div>`;
}
init();

// ── STEP3: 전자서명 캔버스
const canvas=document.getElementById('signCanvas');
const ctx=canvas.getContext('2d');
let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
}
canvas.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)});
canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#2C1A0E';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke()});
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#2C1A0E';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke()},{passive:false});
canvas.addEventListener('touchend',()=>drawing=false);
window.clearSign=()=>ctx.clearRect(0,0,canvas.width,canvas.height);

window.goStep3=()=>{goStep(3);};

// ── STEP4: 계약 저장
window.submitContract=async()=>{
  // 서명 체크 (빈 캔버스 확인)
  const imgData=canvas.toDataURL();
  const blank=document.createElement('canvas');blank.width=canvas.width;blank.height=canvas.height;
  if(imgData===blank.toDataURL()){toast('서명을 완료해주세요.');return;}

  // 서명 이미지를 계약서 미리보기에 삽입
  const signImg=document.getElementById('cv_sign_img');
  if(signImg){signImg.innerHTML=`<img src="${imgData}" style="max-width:200px;border:1px solid #eee;border-radius:4px">`;}

  const contractId='C'+Date.now();
  const dogid=`${G.litter}_${G.puppy}`;
  const data={
    dogid,
    litter: G.litter,
    puppy:  G.puppy,
    dogname:G.dogname,
    sex:    G.sex,
    birthB: G.birthB,
    femaleCode:G.femaleCode,
    maleCode:  G.maleCode,
    deworm1:   G.deworm1,
    deworm2:   G.deworm2,
    price:     Number(G.price)||0,
    saledate:  G.saledate,
    buyer_name:    document.getElementById('b_name').value.trim(),
    buyer_phone:   document.getElementById('b_phone').value.trim(),
    buyer_addr:    document.getElementById('b_addr').value.trim(),
    payment:       document.getElementById('b_payment').value,
    transfer_name: document.getElementById('b_transfer').value.trim(),
    deposit:       Number(document.getElementById('b_deposit').value)||0,
    balance_date:  document.getElementById('b_balance_date').value,
    memo:          document.getElementById('b_memo').value.trim(),
    contract_date: today(),
    signature:     imgData,
    status:       '분양 완료',
    created_at:    new Date().toISOString()
  };

  // Firebase 저장
  await set(ref(db,`contracts/${contractId}`),data);
  // 분양 완료 처리
  await update(ref(db,`litters/${G.litter}/puppies/${G.puppy}`),{status:'분양 완료'});
  // localStorage 백업
  try{
    const ls=JSON.parse(localStorage.getItem('goldi_contracts')||'{}');
    ls[contractId]=data;
    localStorage.setItem('goldi_contracts',JSON.stringify(ls));
  }catch(e){}

  window._savedData=data;
  goStep(4);
  toast('계약이 완료됐습니다! 🎉');
};

// ── PDF 다운로드
window.downloadPDF=async()=>{
  const btn=document.getElementById('pdfBtn');
  btn.textContent='⏳ PDF 생성 중...';btn.disabled=true;
  try{
    const el=document.getElementById('contractPreview');
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const imgData=canvas.toDataURL('image/png');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const w=pdf.internal.pageSize.getWidth();
    const h=(canvas.height*w)/canvas.width;
    let y=0;
    const pageH=pdf.internal.pageSize.getHeight();
    while(y<h){
      if(y>0) pdf.addPage();
      pdf.addImage(imgData,'PNG',0,-y,w,h);
      y+=pageH;
    }
    const fname=`골디쉼터_계약서_${G.dogname}_${today()}.pdf`;
    pdf.save(fname);
  }catch(e){
    toast('PDF 생성 중 오류가 발생했습니다.');
    console.error(e);
  }
  btn.textContent='📄 계약서 PDF 저장';btn.disabled=false;
};
</script>
