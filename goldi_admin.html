<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골디쉼터 관리자</title>
<script>
  if (sessionStorage.getItem('goldi_auth') === 'authenticated') {
    document.documentElement.classList.add('authenticated');
  }
</script>
<style>
:root {
  --gold:#C8931A;--gold-l:#F0BE5A;--gold-p:#FDF5E0;
  --br:#5C3D1E;--br-l:#8B6240;--br-ll:#B8916A;
  --cream:#FAFAF7;--white:#fff;
  --gray:#6B6B6B;--gray-l:#E8E6E0;--gray-ll:#F4F3EF;
  --green:#27AE60;--red:#C0392B;--blue:#1E6FBB;
  --r:10px;--sh:0 2px 14px rgba(92,61,30,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--cream);color:var(--br);min-height:100vh}
#main-content { display: none; opacity: 0; transition: opacity 0.4s ease; }
.authenticated #main-content { display: block; opacity: 1; }
.authenticated #login-overlay { display: none !important; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
header{background:var(--br);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.logo{font-size:20px;color:var(--gold-l);font-weight:800;letter-spacing:-.5px}
.logo span{color:rgba(255,255,255,.45);font-size:12px;font-weight:400;margin-left:6px}
.tab-bar{display:flex;background:var(--br);padding:0 20px;border-bottom:2px solid var(--gold)}
.tab-btn{padding:12px 22px;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;white-space:nowrap}
.tab-btn.active{color:var(--gold-l);border-bottom-color:var(--gold-l)}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.8)}
.tab-panel{display:none;padding:24px 20px;max-width:960px;margin:0 auto}
.tab-panel.active{display:block}
.stitle{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:5px;border-bottom:1.5px solid var(--gold-l)}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--gray-l);padding:20px;margin-bottom:16px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ffield{display:flex;flex-direction:column;gap:4px}
.ffield label{font-size:12px;font-weight:700;color:var(--br-l)}
.ffield input,.ffield select{border:1.5px solid var(--gray-l);border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--br);background:#fff;outline:none;width:100%;transition:border-color .15s}
.ffield input:focus,.ffield select:focus{border-color:var(--gold)}
.puppy-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.puppy-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--gray-l);border-radius:8px;cursor:pointer;transition:.15s;background:#fff}
.puppy-item:hover{border-color:var(--gold);background:var(--gold-p)}
.puppy-item.selected{border-color:var(--gold);background:var(--gold-p);box-shadow:0 0 0 2px var(--gold-l)}
.puppy-item.disabled{opacity:.5;cursor:not-allowed}
.puppy-name{font-weight:700;font-size:14px;flex:1}
.puppy-meta{font-size:12px;color:var(--gray)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-avail{background:#E8F8EF;color:var(--green);border:1px solid #A8DDB9}
.badge-rsv{background:#FFF3E0;color:#E67E22;border:1px solid #F5CBA7}
.badge-sold{background:#F0F0F0;color:#888;border:1px solid #CCC}
.gender-m{color:var(--blue);font-weight:700}
.gender-f{color:#BB1E6F;font-weight:700}
.litter-group{margin-bottom:20px}
.litter-label{font-size:12px;font-weight:800;color:var(--br-l);padding:6px 12px;background:var(--gray-ll);border-radius:6px;margin-bottom:8px;display:flex;gap:10px;align-items:center}
.link-box{background:var(--gray-ll);border:1.5px solid var(--gray-l);border-radius:8px;padding:12px 14px;font-size:12px;word-break:break-all;color:var(--gray);margin-bottom:10px}
.link-box strong{display:block;font-size:11px;color:var(--br-l);margin-bottom:4px}
#qrWrap{text-align:center;padding:16px;background:var(--gray-ll);border-radius:8px;margin-bottom:10px;display:none}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:var(--br)}
.btn-br{background:var(--br);color:#fff}
.btn-br:hover{background:#3a250f}
.btn-gray{background:var(--gray-l);color:var(--br)}
.btn-gray:hover{background:#d8d5ce}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.status-sel{display:flex;gap:6px;flex-wrap:wrap}
.status-opt{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-l);background:#fff;transition:.15s}
.so-avail{background:#E8F8EF;border-color:var(--green);color:var(--green)}
.so-rsv{background:#FFF3E0;border-color:#E67E22;color:#E67E22}
.so-sold{background:#F0F0F0;border-color:#888;color:#888}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--br);color:var(--gold-l);padding:9px 12px;text-align:left;font-weight:700}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--gray-l)}
.tbl tr:hover td{background:var(--gold-p)}
.tbl tr:last-child td{border-bottom:none}
.search-row{display:flex;gap:8px;margin-bottom:14px}
.search-row input{flex:1;border:1.5px solid var(--gray-l);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none}
.search-row input:focus{border-color:var(--gold)}
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{flex:1;min-width:90px;background:#fff;border:1px solid var(--gray-l);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh)}
.stat-n{font-size:26px;font-weight:800;color:var(--gold);line-height:1}
.stat-l{font-size:11px;color:var(--gray);margin-top:3px;font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;justify-content:center;align-items:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.modal-head{background:var(--br);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0}
.modal-head h3{color:var(--gold-l);font-size:15px}
.modal-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer}
.modal-body{padding:20px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-l);font-size:13px}
.detail-row:last-child{border:none}
.detail-key{color:var(--gray);font-weight:600}
.detail-val{color:var(--br);font-weight:700;text-align:right;max-width:60%}
.loading{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--gray-l);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--br);color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.info-chips{display:flex;flex-wrap:wrap;gap:6px 14px;padding:10px 14px;background:var(--gold-p);border-radius:8px;font-size:12px;margin-bottom:14px}
.chip{display:flex;gap:5px}
.chip-k{color:var(--gray);font-weight:600}
.chip-v{color:var(--br);font-weight:700}

/* ═══ 예약 캘린더 CSS ═══ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.cal-nav-center{display:flex;align-items:center;gap:12px}
.cal-nav-center h2{font-size:17px;font-weight:800;color:var(--br);white-space:nowrap}
.cal-arrow{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gray-l);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--br)}
.cal-arrow:hover{border-color:var(--gold);background:var(--gold-p);color:var(--gold)}
.today-banner{background:linear-gradient(135deg,var(--br),#7a5230);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;color:#fff}
.today-banner-title{font-size:12px;font-weight:700;opacity:.7;margin-bottom:6px;letter-spacing:1px}
.today-banner-list{display:flex;flex-direction:column;gap:4px}
.today-banner-item{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.today-banner-empty{font-size:13px;opacity:.6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:18px}
.cal-head{text-align:center;font-size:11px;font-weight:800;padding:8px 0;color:var(--gray)}
.cal-head.sun{color:var(--red)}
.cal-head.sat{color:var(--blue)}
.cal-cell{min-height:52px;padding:4px;border-radius:7px;cursor:pointer;text-align:center;transition:.15s;border:2px solid transparent;position:relative;background:#fff}
.cal-cell:hover{background:var(--gold-p);border-color:var(--gold-l)}
.cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-l)}
.cal-cell.selected{background:var(--gold-p);border-color:var(--gold)}
.cal-cell.other{opacity:.3;cursor:default}
.cal-cell.other:hover{background:#fff;border-color:transparent}
.cal-day{font-size:13px;font-weight:700;line-height:1}
.cal-cell.sun .cal-day{color:var(--red)}
.cal-cell.sat .cal-day{color:var(--blue)}
.cal-dots{display:flex;gap:3px;justify-content:center;margin-top:4px;flex-wrap:wrap}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.dot-confirmed{background:#E67E22}
.cal-dot.dot-completed{background:var(--green)}
.cal-dot.dot-cancelled{background:#aaa}
.cal-count{font-size:9px;font-weight:800;color:var(--gold);margin-top:2px}
.day-panel{margin-bottom:18px}
.day-panel-header{font-size:14px;font-weight:800;color:var(--br);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.day-panel-header .day-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--gold-p);color:var(--gold)}
.rsv-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--gray-l);padding:16px;margin-bottom:12px;border-left:4px solid #E67E22;transition:border-color .15s}
.rsv-card.st-completed{border-left-color:var(--green)}
.rsv-card.st-cancelled{border-left-color:#aaa;opacity:.65}
.rsv-time{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rsv-time .time-icon{font-size:14px}
.rsv-visitor{font-size:15px;font-weight:800;color:var(--br);margin-bottom:6px}
.rsv-contact{display:flex;flex-wrap:wrap;gap:8px 16px;font-size:12px;color:var(--gray);margin-bottom:8px}
.rsv-contact span{display:flex;align-items:center;gap:4px}
.rsv-puppies{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.rsv-puppy-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--gold-p);color:var(--br);border:1px solid var(--gold-l)}
.rsv-puppy-chip .p-sex{font-size:10px}
.rsv-memo{font-size:12px;color:var(--gray);padding:8px 10px;background:var(--gray-ll);border-radius:6px;margin-bottom:10px;line-height:1.5}
.rsv-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rsv-status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.rsv-sb-confirmed{background:#FFF3E0;color:#E67E22;border:1px solid #F5CBA7}
.rsv-sb-completed{background:#E8F8EF;color:var(--green);border:1px solid #A8DDB9}
.rsv-sb-cancelled{background:#F0F0F0;color:#888;border:1px solid #CCC}
.rsv-status-sel{border:1.5px solid var(--gray-l);border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;color:var(--br);outline:none;background:#fff;cursor:pointer}
.month-stats{display:flex;gap:10px;flex-wrap:wrap;padding:12px 14px;background:var(--gray-ll);border-radius:8px;font-size:12px;font-weight:700;color:var(--gray)}
.month-stats span{color:var(--br)}
.no-rsv{text-align:center;padding:30px;color:var(--gray);font-size:13px}

/* 예약 모달 */
.rsv-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;justify-content:center;align-items:flex-start;padding:16px;overflow-y:auto}
.rsv-modal-bg.open{display:flex}
.rsv-modal{background:#fff;border-radius:12px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3);margin-top:40px}
.rsv-modal-head{background:var(--br);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0}
.rsv-modal-head h3{color:var(--gold-l);font-size:14px;font-weight:800}
.rsv-modal-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer}
.rsv-modal-body{padding:18px}
.rsv-field{margin-bottom:14px}
.rsv-field label{display:block;font-size:12px;font-weight:700;color:var(--br-l);margin-bottom:4px}
.rsv-field input,.rsv-field textarea,.rsv-field select{border:1.5px solid var(--gray-l);border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--br);background:#fff;outline:none;width:100%;transition:border-color .15s}
.rsv-field input:focus,.rsv-field textarea:focus{border-color:var(--gold)}
.rsv-field textarea{resize:vertical;min-height:56px}
.rsv-time-row{display:flex;gap:8px;align-items:center}
.rsv-time-row input{flex:1}
.rsv-time-row .time-sep{font-size:14px;font-weight:700;color:var(--gray)}
.rsv-overlap-warn{font-size:11px;color:var(--red);font-weight:700;margin-top:4px;display:none}

/* 강아지 선택 카드 */
.psel-search{border:1.5px solid var(--gray-l);border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--br);background:#fff;outline:none;width:100%;margin-bottom:10px;transition:border-color .15s}
.psel-search:focus{border-color:var(--gold)}
.psel-groups{max-height:260px;overflow-y:auto;border:1.5px solid var(--gray-l);border-radius:8px;padding:8px}
.psel-group-hdr{font-size:11px;font-weight:800;color:var(--br-l);padding:5px 8px;background:var(--gray-ll);border-radius:5px;margin-bottom:6px;margin-top:6px}
.psel-group-hdr:first-child{margin-top:0}
.psel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:8px}
.psel-card{border:2px solid var(--gray-l);border-radius:8px;padding:6px;text-align:center;cursor:pointer;transition:.15s;background:#fff;position:relative}
.psel-card:hover{border-color:var(--gold-l);background:var(--gold-p)}
.psel-card.chosen{border-color:var(--gold);background:var(--gold-p);box-shadow:0 0 0 2px var(--gold-l)}
.psel-card .psel-check{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:var(--gray-l);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900}
.psel-card.chosen .psel-check{background:var(--gold)}
.psel-photo{width:100%;aspect-ratio:1;border-radius:6px;object-fit:cover;display:block;margin-bottom:4px;background:var(--gold-p)}
.psel-placeholder{width:100%;aspect-ratio:1;border-radius:6px;background:var(--gold-p);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:4px}
.psel-name{font-size:11px;font-weight:700;color:var(--br);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psel-sex{font-size:10px;color:var(--gray)}
.psel-selected{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;min-height:22px}
.psel-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;background:var(--gold);color:#fff}
.psel-tag .tag-x{cursor:pointer;opacity:.7;margin-left:2px}
.psel-tag .tag-x:hover{opacity:1}

@media(max-width:560px){
  .fgrid{grid-template-columns:1fr}
  
  header{padding:10px 16px}
  .logo{font-size:16px}
  .logo span{font-size:10px;margin-left:4px}
  
  .tab-bar{padding:0 4px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab-btn{flex:1;padding:11px 2px;font-size:11px;text-align:center;justify-content:center;min-width:0}
  
  #tab-db{padding:16px 12px}
  .search-row{gap:6px}
  .search-row input{font-size:13px;padding:8px 10px}
  
  #dbList{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--gray-l);background:#fff}
  .tbl{min-width:620px}
  .tbl th, .tbl td{padding:8px 10px;font-size:12px}
  
  .card{padding:14px 12px;margin-bottom:12px}
  .stitle{font-size:10px;margin-bottom:10px}
  .info-chips{padding:8px 10px;gap:4px 10px;font-size:11px;margin-bottom:12px}
  .chip{gap:3px}
  
  .puppy-list{gap:6px;margin-bottom:12px}
  .puppy-item{padding:10px 12px;gap:8px}
  .puppy-name{font-size:13px}
  .puppy-meta{font-size:11px}
  
  .modal{max-width:94%;margin:16px auto}
  .modal-head{padding:12px 16px}
  .modal-body{padding:14px 16px}

  /* 캘린더 모바일 */
  .cal-nav{gap:6px}
  .cal-nav-center h2{font-size:14px}
  .cal-arrow{width:30px;height:30px;font-size:14px}
  .cal-cell{min-height:42px;padding:3px 2px}
  .cal-day{font-size:11px}
  .cal-count{font-size:8px}
  .cal-dot{width:5px;height:5px}
  .today-banner{padding:10px 14px}
  .today-banner-item{font-size:12px}
  .rsv-card{padding:12px;margin-bottom:10px}
  .rsv-visitor{font-size:14px}
  .rsv-actions{gap:6px}
  .rsv-modal{max-width:96%;margin-top:16px}
  .rsv-modal-body{padding:14px}
  .psel-grid{grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:5px}
  .psel-groups{max-height:200px}
  .month-stats{font-size:11px;gap:6px;padding:10px}
}
</style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="login-overlay" style="position:fixed;inset:0;background:var(--cream);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px">
  <div class="card" style="max-width:360px;width:100%;text-align:center;box-shadow:var(--sh);padding:30px;border-radius:12px;border:1px solid var(--gray-l);background:#fff">
    <div style="font-size:3.5rem;margin-bottom:14px">🔑</div>
    <h2 style="font-size:1.1rem;font-weight:900;color:var(--br);margin-bottom:8px">골디쉼터 보안 인증</h2>
    <p style="font-size:0.8rem;color:var(--gray);margin-bottom:20px">관리자 비밀번호를 입력해주세요.</p>
    <div style="margin-bottom:16px">
      <input type="password" id="login-password" placeholder="비밀번호 입력" style="border:1.5px solid var(--gray-l);border-radius:8px;padding:10px 14px;font-size:15px;width:100%;outline:none;text-align:center">
    </div>
    <button class="btn btn-gold" onclick="attemptLogin()" style="width:100%;justify-content:center;padding:12px">인증하기</button>
    <div id="login-error" style="color:var(--red);font-size:12px;margin-top:10px;font-weight:700;display:none">⚠️ 비밀번호가 일치하지 않습니다.</div>
  </div>
</div>

// ── 유틸
// ── 로그인 세션 보안 제어
window.attemptLogin = () => {
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  const overlay = document.getElementById('login-overlay');
  const main = document.getElementById('main-content');
  
  if (pw === '5900') {
    sessionStorage.setItem('goldi_auth', 'authenticated');
    err.style.display = 'none';
    
    // 부드러운 화면 전환 효과
    overlay.style.transition = 'opacity 0.4s ease';
    overlay.style.opacity = '0';
    main.style.display = 'block';
    setTimeout(() => {
      main.style.opacity = '1';
    }, 50);
    
    setTimeout(() => {
      overlay.remove();
      document.documentElement.classList.add('authenticated');
    }, 400);
  } else {
    err.style.display = 'block';
    const pwInput = document.getElementById('login-password');
    pwInput.value = '';
    pwInput.focus();
    
    // 좌우 흔들기 애니메이션 부여
    const card = overlay.querySelector('.card');
    card.style.animation = 'none';
    setTimeout(() => {
      card.style.animation = 'shake 0.4s ease';
    }, 10);
  }
};

// 엔터 키 이벤트 바인딩 및 자동 포커스
window.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('login-password');
  if (pwInput) {
    pwInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        window.attemptLogin();
      }
    });
    if (sessionStorage.getItem('goldi_auth') !== 'authenticated') {
      setTimeout(() => pwInput.focus(), 100);
    }
  }
});

const fmt = d => d ? d.replace(/-/g,'.') : '—';
const numFmt = n => Number(n).toLocaleString('ko-KR')+'원';
function esc(s){const d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML;}
function genderTxt(s){
  const v=String(s||'').toLowerCase();
  if(v==='female'||v==='암'||v==='f') return '암컷';
  if(v==='male'  ||v==='수'||v==='m') return '수컷';
  return esc(s)||'—';
}
function genderKo(s){
  const v=String(s||'').toLowerCase();
  if(v==='female'||v==='암'||v==='f') return '<span class="gender-f">♀ 암컷</span>';
  if(v==='male'  ||v==='수'||v==='m') return '<span class="gender-m">♂ 수컷</span>';
  return esc(s)||'—';
}
function statusBadge(st){
  if(!st||st==='분양 전') return '<span class="badge badge-avail">분양 전</span>';
  if(st==='예약')         return '<span class="badge badge-rsv">예약</span>';
  return                         '<span class="badge badge-sold">분양 완료</span>';
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ── 탭
window.switchTab=(btn,name)=>{
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='calendar'){
    renderCalendar();
    renderTodaySummary();
    renderDayReservations(window._calSelectedDate);
    renderMonthStats();
  }
};

// ── SWR 로컬 캐시 부스터 (체감 로딩 속도 0.01초 단축)
function saveLocalCache(key, data) {
  try {
    localStorage.setItem('goldi_admin_cache_' + key, JSON.stringify(data));
  } catch(e) {
    console.warn(`[Cache Limit] Admin ${key} 저장 제한:`, e);
  }
}

function restoreLocalCache() {
  try {
    const cachedLitters = localStorage.getItem('goldi_admin_cache_litters');
    const cachedContracts = localStorage.getItem('goldi_admin_cache_contracts');
    
    if (cachedLitters) {
      window._litters = JSON.parse(cachedLitters);
      // DOM 로드 완료 대기 후 캐시 데이터 렌더링
      setTimeout(() => {
        renderPuppyGroups();
        renderManageList();
        updateStats();
        
        // 자동 선택 연동 파라미터가 있는 경우 처리
        if (initLitter && initPuppy && !window._autoSelectedTriggered) {
          window._autoSelectedTriggered = true;
          selectPuppy(initLitter, initPuppy);
        }
      }, 50);
    }
    if (cachedContracts) {
      window._contracts = JSON.parse(cachedContracts);
      setTimeout(renderDB, 50);
    }
    const cachedReservations = localStorage.getItem('goldi_admin_cache_reservations');
    if (cachedReservations) {
      window._reservations = JSON.parse(cachedReservations);
    }
  } catch(e) {
    console.error('[Admin Cache Restore Error]:', e);
  }
}

// 스크립트 실행 즉시 캐시 복원
restoreLocalCache();

// ── Firebase 구독
onValue(ref(db,'litters'),snap=>{
  window._litters=snap.val()||{};
  renderPuppyGroups();
  renderManageList();
  updateStats();
  
  saveLocalCache('litters', window._litters);
  
  // 농장관리로부터 넘어온 자동 분양 연동 처리
  if (initLitter && initPuppy && !window._autoSelectedTriggered) {
    window._autoSelectedTriggered = true;
    setTimeout(() => {
      selectPuppy(initLitter, initPuppy);
    }, 300);
  }
});
onValue(ref(db,'contracts'),snap=>{
  const fb=snap.val()||{};
  let ls={};
  try{ls=JSON.parse(localStorage.getItem('goldi_contracts')||'{}')}catch(e){}
  window._contracts={...ls,...fb};
  renderDB();
  
  saveLocalCache('contracts', window._contracts);
});

// ── Firebase 예약 구독
onValue(ref(db,'reservations'),snap=>{
  window._reservations=snap.val()||{};
  saveLocalCache('reservations', window._reservations);
  // 캘린더 탭이 활성화된 경우에만 렌더링
  if(document.getElementById('tab-calendar')?.classList.contains('active')){
    renderCalendar();
    renderTodaySummary();
    renderDayReservations(window._calSelectedDate);
    renderMonthStats();
  }
});

// ── TAB1: 새끼 선택
function renderPuppyGroups(){
  document.getElementById('puppyLoading').style.display='none';
  const litters=window._litters;
  const container=document.getElementById('puppyGroups');
  if(!Object.keys(litters).length){container.innerHTML='<div class="loading">등록된 출산 그룹이 없습니다.</div>';return;}

  const sorted=Object.entries(litters).sort(([,a],[,b])=>(b.birthB||'').localeCompare(a.birthB||''));
  container.innerHTML=sorted.map(([lid,l])=>{
    const puppies=l.puppies||{};
    if(!Object.keys(puppies).length) return '';
    const items=Object.entries(puppies).map(([pid,p])=>{
      const sold=p.status==='분양 완료';
      const photoEl = p.photo
        ? `<img src="${p.photo}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-l);flex-shrink:0;">`
        : `<div style="width:40px;height:40px;border-radius:6px;background:var(--gold-p);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--gray-l);flex-shrink:0;">🐶</div>`;
      
      return `<div class="puppy-item${sold?' disabled':''}" id="pi-${lid}-${pid}" onclick="selectPuppy('${lid}','${pid}')">
        ${photoEl}
        <div style="flex:1">
          <div class="puppy-name">${esc(p.name||pid)}</div>
          <div class="puppy-meta">${genderTxt(p.sex)} · 출생 ${fmt(l.birthB)}</div>
        </div>
        <div>${statusBadge(p.status)}</div>
      </div>`;
    }).join('');
    return `<div class="litter-group">
      <div class="litter-label">♀ ${esc(l.femaleCode||'—')} × ♂ ${esc(l.maleCode||'—')} <span style="color:var(--gold-l);font-size:11px">${fmt(l.birthB)}</span></div>
      <div class="puppy-list">${items}</div>
    </div>`;
  }).join('');
}

window.selectPuppy=(lid,pid)=>{
  const l=window._litters[lid];
  const p=(l?.puppies||{})[pid];
  if(!p) return;
  if(p.status==='분양 완료'){toast('이미 분양 완료된 강아지입니다.');return;}

  window._selected={litterId:lid,puppyId:pid,litter:l,puppy:p};
  document.querySelectorAll('.puppy-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById(`pi-${lid}-${pid}`)?.classList.add('selected');

  const selectedPhoto = p.photo
    ? `<img src="${p.photo}" style="width:54px;height:54px;object-fit:cover;border-radius:8px;border:1.5px solid var(--gold);flex-shrink:0;">`
    : `<div style="width:54px;height:54px;border-radius:8px;background:var(--gold-p);display:flex;align-items:center;justify-content:center;font-size:24px;border:1.5px solid var(--gold);flex-shrink:0;">🐶</div>`;

  document.getElementById('selectedInfo').innerHTML=`
    ${selectedPhoto}
    <div style="flex:1;display:flex;flex-wrap:wrap;gap:6px 14px">
      <div class="chip"><span class="chip-k">이름</span><span class="chip-v">${esc(p.name||pid)}</span></div>
      <div class="chip"><span class="chip-k">성별</span><span class="chip-v">${genderTxt(p.sex)}</span></div>
      <div class="chip"><span class="chip-k">출생일(birthB)</span><span class="chip-v">${fmt(l.birthB)}</span></div>
      <div class="chip"><span class="chip-k">모견</span><span class="chip-v">${esc(l.femaleCode||'—')}</span></div>
      <div class="chip"><span class="chip-k">구충1차</span><span class="chip-v">${fmt(l.deworm1)}</span></div>
      <div class="chip"><span class="chip-k">구충2차</span><span class="chip-v">${fmt(l.deworm2)}</span></div>
    </div>`;
  document.getElementById('s_memo').value = '';
  document.getElementById('s_saledate').value=new Date().toISOString().slice(0,10);
  document.getElementById('sendForm').style.display='block';
  document.getElementById('linkCard').style.display='none';
  document.getElementById('sendForm').scrollIntoView({behavior:'smooth',block:'nearest'});
};

window.generateLink=()=>{
  const sel=window._selected;
  if(!sel){toast('새끼를 먼저 선택해주세요.');return;}
  const price=document.getElementById('s_price').value;
  const saledate=document.getElementById('s_saledate').value;
  const memo=document.getElementById('s_memo').value.trim();
  if(!price||!saledate){toast('분양가와 분양 예정일을 입력해주세요.');return;}

  const {litterId:lid,puppyId:pid,litter:l,puppy:p}=sel;
  const params=new URLSearchParams({
    litter:lid, puppy:pid,
    dogname:p.name||pid,
    sex:p.sex||'',
    birthB:l.birthB||'',
    deworm1:l.deworm1||'',
    deworm2:l.deworm2||'',
    femaleCode:l.femaleCode||'',
    maleCode:l.maleCode||'',
    price, saledate,
    memo
  });
  const base=location.href.split('?')[0].replace(/\/goldi_admin(\.html)?$/i,'/goldi_contract_form.html');
  const url=base+'?'+params.toString();
  window._contractUrl=url;

  document.getElementById('contractLink').textContent=url;
  document.getElementById('linkCard').style.display='block';
  document.getElementById('qrWrap').style.display='none';

  // QR 생성
  const target=document.getElementById('qrTarget');
  target.innerHTML='';
  function makeQR(){try{new window.QRCode(target,{text:url,width:180,height:180});}catch(e){console.error('QR 생성 실패:',e);}}
  const existScript=document.querySelector('script[src*="qrcode"]');
  if(!existScript){
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    script.onload=makeQR;
    document.head.appendChild(script);
  } else if(window.QRCode){
    makeQR();
  } else {
    existScript.addEventListener('load',makeQR);
  }

  toast('링크가 생성됐습니다!');
};

const DAYS_KO=['일','월','화','수','목','금','토'];

function getReservationsForDate(dateStr){
  return Object.entries(window._reservations).filter(([,r])=>r.date===dateStr).sort(([,a],[,b])=>{
    if(!a.timeStart&&!b.timeStart) return 0;
    if(!a.timeStart) return 1;
    if(!b.timeStart) return -1;
    return a.timeStart.localeCompare(b.timeStart);
  });
}

function getReservationsForMonth(y,m){
  const prefix=`${y}-${String(m+1).padStart(2,'0')}`;
  return Object.entries(window._reservations).filter(([,r])=>r.date&&r.date.startsWith(prefix));
}

// ── 캘린더 렌더링
function renderCalendar(){
  const y=window._calYear, m=window._calMonth;
  document.getElementById('calTitle').textContent=`${y}년 ${m+1}월`;
  const grid=document.getElementById('calGrid');
  
  // 요일 헤더
  let html=DAYS_KO.map((d,i)=>`<div class="cal-head${i===0?' sun':''}${i===6?' sat':''}">${d}</div>`).join('');
  
  const firstDay=new Date(y,m,1).getDay();
  const lastDate=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  
  // 이전 달 빈칸
  for(let i=firstDay-1;i>=0;i--){
    const d=prevLast-i;
    html+=`<div class="cal-cell other"><div class="cal-day">${d}</div></div>`;
  }
  
  // 이번 달
  for(let d=1;d<=lastDate;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isSel=ds===window._calSelectedDate;
    const dayOfWeek=new Date(y,m,d).getDay();
    const rsvs=getReservationsForDate(ds);
    
    let dotHtml='';
    if(rsvs.length){
      const hasConfirmed=rsvs.some(([,r])=>r.status==='예약 확정');
      const hasCompleted=rsvs.some(([,r])=>r.status==='방문 완료');
      const hasCancelled=rsvs.some(([,r])=>r.status==='취소');
      dotHtml='<div class="cal-dots">';
      if(hasConfirmed) dotHtml+='<div class="cal-dot dot-confirmed"></div>';
      if(hasCompleted) dotHtml+='<div class="cal-dot dot-completed"></div>';
      if(hasCancelled) dotHtml+='<div class="cal-dot dot-cancelled"></div>';
      dotHtml+=`</div><div class="cal-count">${rsvs.length}건</div>`;
    }
    
    html+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}${dayOfWeek===0?' sun':''}${dayOfWeek===6?' sat':''}" onclick="selectCalDate('${ds}')">
      <div class="cal-day">${d}</div>${dotHtml}</div>`;
  }
  
  // 다음 달 빈칸
  const totalCells=firstDay+lastDate;
  const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let i=1;i<=remaining;i++){
    html+=`<div class="cal-cell other"><div class="cal-day">${i}</div></div>`;
  }
  
  grid.innerHTML=html;
}

window.calPrev=()=>{
  window._calMonth--;
  if(window._calMonth<0){window._calMonth=11;window._calYear--;}
  renderCalendar();renderMonthStats();
};
window.calNext=()=>{
  window._calMonth++;
  if(window._calMonth>11){window._calMonth=0;window._calYear++;}
  renderCalendar();renderMonthStats();
};
window.selectCalDate=(ds)=>{
  window._calSelectedDate=ds;
  renderCalendar();

};

// ── 일별 예약 목록
function renderDayReservations(dateStr){
  const panel=document.getElementById('dayPanel');
  const rsvs=getReservationsForDate(dateStr);
  const dateObj=new Date(dateStr+'T00:00:00');
  const dayName=DAYS_KO[dateObj.getDay()];
  const [,mm,dd]=dateStr.split('-');
  
  let html=`<div class="day-panel-header">📅 ${parseInt(mm)}월 ${parseInt(dd)}일 (${dayName}) <span class="day-count">${rsvs.length}건</span></div>`;
  
  if(!rsvs.length){
    html+='<div class="no-rsv">이 날짜에 예약이 없습니다.</div>';
  } else {
    rsvs.forEach(([id,r])=>{
      const timeLabel=r.timeStart?`${r.timeStart}${r.timeEnd?' ~ '+r.timeEnd:''}`:'시간 미정';
      const stClass=r.status==='방문 완료'?'st-completed':r.status==='취소'?'st-cancelled':'';
      const stBadge=r.status==='방문 완료'?'rsv-sb-completed':r.status==='취소'?'rsv-sb-cancelled':'rsv-sb-confirmed';
      
      let contactHtml='';
      if(r.visitorPhone) contactHtml+=`<span>📞 ${esc(r.visitorPhone)}</span>`;
      if(r.visitorKakao) contactHtml+=`<span>💬 ${esc(r.visitorKakao)}</span>`;
      
      let puppyHtml='';
      if(r.puppies&&r.puppies.length){
        puppyHtml='<div class="rsv-puppies">'+r.puppies.map(p=>{
          const litter=window._litters[p.litterId];
          const parentInfo=litter?` (${esc(litter.femaleCode||'?')}×${esc(litter.maleCode||'?')})`:'';
          const pData=litter?.puppies?.[p.puppyId];
          const sexIcon=pData?(pData.sex==='female'?'♀':'♂'):'';
          return `<span class="rsv-puppy-chip">🐶 ${esc(p.puppyName)} <span class="p-sex">${sexIcon}</span>${parentInfo}</span>`;
        }).join('')+'</div>';
      }
      
      let memoHtml='';
      if(r.memo) memoHtml=`<div class="rsv-memo">📝 ${esc(r.memo)}</div>`;
      
      html+=`<div class="rsv-card ${stClass}">
        <div class="rsv-time"><span class="time-icon">🕐</span> ${esc(timeLabel)}</div>
        <div class="rsv-visitor">👤 ${esc(r.visitorName)}</div>
        ${contactHtml?'<div class="rsv-contact">'+contactHtml+'</div>':''}
        ${puppyHtml}
        ${memoHtml}
        <div class="rsv-actions">
          <span class="rsv-status-badge ${stBadge}">${esc(r.status||'예약 확정')}</span>
          <select class="rsv-status-sel" onchange="updateRsvStatus('${id}',this.value)">
            <option value="예약 확정"${r.status==='예약 확정'||!r.status?' selected':''}>예약 확정</option>
            <option value="방문 완료"${r.status==='방문 완료'?' selected':''}>방문 완료</option>
            <option value="취소"${r.status==='취소'?' selected':''}>취소</option>
          </select>
          <button class="btn btn-gray btn-sm" onclick="copyRsvMessage('${id}')">📋 안내</button>
          <button class="btn btn-gray btn-sm" onclick="openRsvModal('${dateStr}','${id}')">✏ 수정</button>
          <button class="btn btn-gray btn-sm" style="color:var(--red)" onclick="deleteReservation('${id}')">🗑</button>
        </div>
      </div>`;
    });
  }
  
  panel.innerHTML=html;
  panel.style.display='block';
}

  sorted.forEach(([lid,l])=>{
    const puppies=Object.entries(l.puppies||{}).filter(([,p])=>{
      if(p.status==='분양 완료') return false;
      if(!kw) return true;
      return (p.name||'').toLowerCase().includes(kw)||(l.femaleCode||'').toLowerCase().includes(kw)||(l.maleCode||'').toLowerCase().includes(kw);
    });
    if(!puppies.length) return;
    hasResults=true;
    
    html+=`<div class="psel-group-hdr">♀ ${esc(l.femaleCode||'—')} × ♂ ${esc(l.maleCode||'—')} · ${fmt(l.birthB)}</div>`;
    html+='<div class="psel-grid">';
    puppies.forEach(([pid,p])=>{
      const chosen=window._rsvSelectedPuppies.some(sp=>sp.litterId===lid&&sp.puppyId===pid);
      const photoEl=p.photo?`<img class="psel-photo" src="${p.photo}" alt="${esc(p.name||pid)}">`:`<div class="psel-placeholder">🐶</div>`;
      const sexTxt=p.sex==='female'?'♀ 암컷':p.sex==='male'?'♂ 수컷':'—';
      html+=`<div class="psel-card${chosen?' chosen':''}" onclick="togglePuppySel('${lid}','${pid}','${esc(p.name||pid)}')">
        <div class="psel-check">${chosen?'✓':''}</div>
        ${photoEl}
        <div class="psel-name">${esc(p.name||pid)}</div>
        <div class="psel-sex">${sexTxt}</div>
      </div>`;
    });
    html+='</div>';
  });
  
  if(!hasResults) html='<div class="no-rsv">검색 결과가 없습니다.</div>';
  container.innerHTML=html;
};

window.togglePuppySel=(lid,pid,name)=>{
  const idx=window._rsvSelectedPuppies.findIndex(p=>p.litterId===lid&&p.puppyId===pid);
  if(idx>=0) window._rsvSelectedPuppies.splice(idx,1);
  else window._rsvSelectedPuppies.push({litterId:lid,puppyId:pid,puppyName:name});
  renderPuppySelector();
  renderSelectedPuppyTags();
};

function renderSelectedPuppyTags(){
  const el=document.getElementById('pselSelected');
  if(!window._rsvSelectedPuppies.length){el.innerHTML='';return;}
  el.innerHTML=window._rsvSelectedPuppies.map(p=>
    `<span class="psel-tag">${esc(p.puppyName)} <span class="tag-x" onclick="togglePuppySel('${p.litterId}','${p.puppyId}','${esc(p.puppyName)}')">✕</span></span>`
  ).join('');
}

// ── 시간 겹침 검사
function checkTimeOverlap(dateStr,startTime,endTime,excludeId){
  if(!startTime||!endTime) return false;
  const rsvs=getReservationsForDate(dateStr);
  return rsvs.some(([id,r])=>{
    if(id===excludeId) return false;
    if(r.status==='취소') return false;
    if(!r.timeStart||!r.timeEnd) return false;
    return startTime<r.timeEnd && endTime>r.timeStart;
  });
}

// ── 예약 저장
window.saveReservation=async()=>{
  const editId=document.getElementById('rsv_editId').value;
  const dateVal=document.getElementById('rsv_date').value;
  const timeStart=document.getElementById('rsv_timeStart').value;
  const timeEnd=document.getElementById('rsv_timeEnd').value;
  const nameVal=document.getElementById('rsv_name').value.trim();
  const phoneVal=document.getElementById('rsv_phone').value.trim();
  const kakaoVal=document.getElementById('rsv_kakao').value.trim();
  const memoVal=document.getElementById('rsv_memo').value.trim();
  
  if(!dateVal||!nameVal){toast('날짜와 방문자 이름은 필수입니다.');return;}
  
  // 시간 겹침 검사
  if(timeStart&&timeEnd){
    if(timeStart>=timeEnd){toast('종료 시간은 시작 시간보다 뒤여야 합니다.');return;}
    if(checkTimeOverlap(dateVal,timeStart,timeEnd,editId||null)){
      document.getElementById('rsvOverlapWarn').style.display='block';
      toast('⚠ 해당 시간대에 기존 예약이 겹칩니다.');return;
    }
  }
  document.getElementById('rsvOverlapWarn').style.display='none';
  
  const data={
    date:dateVal,
    timeStart:timeStart||'',
    timeEnd:timeEnd||'',
    visitorName:nameVal,
    visitorPhone:phoneVal,
    visitorKakao:kakaoVal,
    memo:memoVal,
    status:editId&&window._reservations[editId]?window._reservations[editId].status:'예약 확정',
    puppies:window._rsvSelectedPuppies,
    updatedAt:new Date().toISOString()
  };
  
  try{
    if(editId){
      await update(ref(db,`reservations/${editId}`),data);
      toast('예약이 수정되었습니다.');
    } else {
      data.createdAt=new Date().toISOString();
      await push(ref(db,'reservations'),data);
      toast('예약이 등록되었습니다!');
    }
    closeRsvModal();
    window._calSelectedDate=dateVal;
    const d=new Date(dateVal+'T00:00:00');
    window._calYear=d.getFullYear();
    window._calMonth=d.getMonth();
    renderCalendar();renderTodaySummary();renderDayReservations(dateVal);renderMonthStats();
  }catch(e){
    console.error('예약 저장 실패:',e);
    toast('⚠ 예약 저장에 실패했습니다.');
  }
};

// ── 예약 삭제
window.deleteReservation=async(id)=>{
  if(!confirm('이 예약을 삭제하시겠습니까?')) return;
  try{
    await remove(ref(db,`reservations/${id}`));
    toast('예약이 삭제되었습니다.');
  }catch(e){
    console.error('예약 삭제 실패:',e);
    toast('⚠ 예약 삭제에 실패했습니다.');
  }
};

// ── 예약 상태 변경
window.updateRsvStatus=async(id,status)=>{
  try{
    await update(ref(db,`reservations/${id}`),{status,updatedAt:new Date().toISOString()});
    toast(`"${status}"로 변경되었습니다.`);
  }catch(e){
    console.error('상태 변경 실패:',e);
    toast('⚠ 상태 변경에 실패했습니다.');
  }
};

// ── 카카오 안내 메시지 복사
window.copyRsvMessage=(id)=>{
  const r=window._reservations[id];
  if(!r) return;
  
  const dateObj=new Date(r.date+'T00:00:00');
  const dayName=DAYS_KO[dateObj.getDay()];
  const [yy,mm,dd]=r.date.split('-');
  
  let timeInfo='';
  if(r.timeStart&&r.timeEnd){
    timeInfo=`🕐 시간: ${r.timeStart} ~ ${r.timeEnd}`;
  } else if(r.timeStart){
    timeInfo=`🕐 시간: ${r.timeStart}~`;
  } else {
    timeInfo='🕐 시간: 추후 안내';
  }
  
  const puppyNames=(r.puppies||[]).map(p=>p.puppyName).join(', ');
  
  const msg=`[골디쉼터 방문 예약 안내] 🐾\n\n안녕하세요, 골디 쉼터입니다.\n방문 예약이 확정되어 안내드립니다.\n\n📅 방문일: ${yy}년 ${parseInt(mm)}월 ${parseInt(dd)}일 (${dayName})\n${timeInfo}\n${puppyNames?'🐶 보실 아이: '+puppyNames+'\n':''}\n⏰ 방문 시간은 약 1시간 30분 단위로 안내드리고 있습니다.\n정확한 시간에 맞춰 방문해 주시면 감사하겠습니다.\n\n❓ 문의: 010-6508-5901\n💬 카카오 상담: open.kakao.com/o/sxGtK0ri\n\n골디 쉼터 🐾\n소규모지만 윤리적으로 키운 아이들`;
  
  navigator.clipboard.writeText(msg);
  toast('안내 메시지가 복사되었습니다. 카카오톡에 붙여넣기 하세요!');
};
